name: Repo Hygiene

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify required files
        shell: bash
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f docs/STATUS.md
          test -f GOVERNANCE.md
          test -f FAILURE_MODES.md
          test -f node.env.example
          test -f .github/CODEOWNERS
